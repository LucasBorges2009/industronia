<section class="min-h-screen bg-linear-to-b from-gray-950 to-gray-900 text-white pt-28 p-10">

  <div class="max-w-6xl mx-auto">

    <h1 class="text-4xl font-bold mb-10 text-center text-red-400 uppercase">
      ⚙️ Curiosidades Industriais
    </h1>

    <div class="grid gap-8 md:grid-cols-2">

      <div *ngFor="let item of curiosidades"
           class="bg-gray-800 border border-red-500/30 rounded-xl p-6 
                  hover:-translate-y-2 transition">

        <h2 class="text-xl font-bold text-red-300 mb-3">
          {{ item.titulo }}
        </h2>

        <p class="text-gray-300">
          {{ item.descricao }}
        </p>

      </div>

    </div>

  </div>

</section>
