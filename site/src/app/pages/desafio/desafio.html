<section class="min-h-screen bg-linear-to-b from-gray-950 via-gray-900 to-gray-950 text-white pt-28 pb-16 px-6">

  <div class="max-w-6xl mx-auto">

    <!-- Título -->
    <div class="text-center mb-12">
      <h1 class="text-4xl md:text-5xl font-extrabold text-red-400 tracking-widest uppercase">
        ⚙️ Desafio Econômico
      </h1>
      <div class="w-24 h-1 bg-red-400 mx-auto mt-4"></div>
    </div>

    <!-- Card principal -->
    <div class="bg-gray-800 border border-red-500/30 rounded-2xl p-8 shadow-xl relative overflow-hidden">

      <!-- efeito glow -->
      <div class="absolute inset-0 bg-red-400/5"></div>

      <!-- barra lateral -->
      <div class="absolute left-0 top-0 h-full w-2 bg-red-400"></div>

      <div class="relative z-10">

        <!-- Pergunta -->
        <h2 class="text-2xl font-bold text-red-300 mb-6">
          {{ desafio.pergunta }}
        </h2>

        <!-- Linha -->
        <div class="w-16 h-1 bg-red-400 mb-6"></div>

        <!-- Descrição -->
        <p class="text-gray-300 leading-relaxed text-lg mb-8">
          {{ desafio.descricao }}
        </p>

        <!-- Lista de pontos -->
        <div class="grid md:grid-cols-2 gap-6">

          <div *ngFor="let item of desafio.pontos"
               class="bg-gray-900 border border-red-500/20 rounded-xl p-5 
                      hover:border-red-400 transition">

            <h3 class="text-red-300 font-semibold mb-2">
              ⚙️ {{ item.titulo }}
            </h3>

            <p class="text-gray-400 text-sm">
              {{ item.texto }}
            </p>

          </div>

        </div>

      </div>
    </div>

  </div>

</section>
